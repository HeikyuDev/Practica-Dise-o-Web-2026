<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listas y Tablas</title>
</head>
<body>
    <h1>Listas y Tablas</h1>

    <h2>Tabla</h2>

    <table>
        <tr>
            <th>Columna 1</th>
            <th>Columna 2</th>
        </tr>
        <tr>
            <td>Celda 1</td>
            <td>Celda 2</td>
        </tr>
    </table>

    <h2>Lista</h2>

    <ul>
        <li>Elemento 1</li>
        <li>Elemento 2</li>
    </ul>
    
</body>
</html>
